<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcadeOS</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="topbar">
        <p class="topbar-left">Window name</p>
        <p id="welcome-open" class="open-btn">ArcadeOS</p>
        <p id="time" class="topbar-right">00:00:00</p>
    </div>

    <div id="welcome" class="window">
        <div id="welcome-header" class="window-header">
            <span></span>
            <p>Welcome</p>
            <div id="welcome-close" class="close-btn"></div>
        </div>

        <div class="window-content">
            <h1>Welcome to ArcadeOS!</h1>
            <p>Soon, here will be a couple of retro arcade games, like pacman or spacewar. Stay tuned!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
